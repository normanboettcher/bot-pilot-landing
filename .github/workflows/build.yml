name: Build

on:
  push:
    branches: [ "main", "build/**", "feature/**", "fix/**", "refactoring/**" ]
    paths:
      - 'contact-form-mail/**/src/**'
      - 'contact-form-mail/**/pom.xml'
      - 'contact-form-mail/mvnw'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'contact-form-mail/**/src/**'
      - 'contact-form-mail/**/pom.xml'
      - 'contact-form-mail/mvnw'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./contact-form-mail/mvnw verify --batch-mode --no-transfer-progress -f ./contact-form-mail/pom.xml

      - name: JaCoCo coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: contact-form-mail/contact-form-mail-integrationtests/target/site/jacoco-aggregate/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: contact-form-mail/contact-form-mail-integrationtests/target/site/jacoco-aggregate/
          retention-days: 14
