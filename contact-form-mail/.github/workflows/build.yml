name: Build

on:
  push:
    branches: [ "main", "build/**", "feature/**", "fix/**", "refactoring/**" ]
    paths:
      - '**/src/**'
      - 'pom.xml'
      - '**/pom.xml'
      - 'mvnw'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/src/**'
      - 'pom.xml'
      - '**/pom.xml'
      - 'mvnw'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw verify --batch-mode --no-transfer-progress
