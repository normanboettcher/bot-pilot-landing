name: 'bot-pilot-landing-dev'
networks:
  landing-dev:

services:
  bot-pilot-landing:
    build:
      context: ../../frontend
      dockerfile: ./deployment/dev/Containerfile
    container_name: bot_pilot_landing
    networks:
      - landing-dev
    ports:
      - "5173:5173"

  bot-pilot-mail:
    build:
      context: ../../mail-service
      dockerfile: ./deployment/dev/Containerfile
    container_name: mail_service
    env_file:
      - ../../mail-service/.env
    networks:
      - landing-dev
    ports:
      - "8000"
