name: 'bot-pilot-landing-prod'
networks:
  landing-prod:

services:
  caddy-prod:
    image: caddy:latest
    container_name: caddy-prod
    restart: unless-stopped
    ports:
      - "8443:8443"
    networks:
      - landing-prod
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro,Z
  bot-pilot-landing:
    build:
      context: ../../frontend
      dockerfile: ./deployment/prod/Containerfile
    container_name: bot_pilot_landing_prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - landing-prod
    expose:
      - "80"

  bot-pilot-mail:
    build:
      context: ../../mail-service
      dockerfile: ./deployment/prod/Containerfile
    container_name: mail_service_prod
    restart: unless-stopped
    env_file:
      - ../../mail-service/.env
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
    networks:
      - landing-prod
    expose:
      - "80"
